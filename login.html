<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零柒零音乐 - 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --primary-hover: #222222;
            --bg: #ffffff;
            --surface: #f9f9f9;
            --surface-elevated: #f5f5f5;
            --text: #000000;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: rgba(0, 0, 0, 0.1);
            --border-strong: rgba(0, 0, 0, 0.2);
            --success: #333333;
            --error: #dc2626;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        html.dark-theme {
            --primary: #ffffff;
            --primary-hover: #e0e0e0;
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-elevated: #252525;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --border: rgba(255, 255, 255, 0.1);
            --border-strong: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .login-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }

        .auth-box {
            width: min(880px, 96vw);
            height: clamp(400px, 80vh, 560px);
            border-radius: clamp(16px, 2.5vw, 28px);
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .auth-box::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 60%;
            width: 1px;
            background: var(--border);
            z-index: 10;
            pointer-events: none;
            transition: left 0.72s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .auth-box.signup-mode::after {
            left: 40%;
        }

        .panel {
            position: absolute;
            top: 0;
            height: 100%;
            transition: left 0.72s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .pA {
            left: 0;
            width: 60%;
            background: var(--surface);
            box-shadow: inset -8px 0 24px rgba(0, 0, 0, 0.05);
            z-index: 1;
        }

        .auth-box.signup-mode .pA {
            left: 40%;
        }

        .pB {
            left: 60%;
            width: 40%;
            background: var(--surface-elevated);
            z-index: 3;
            overflow: hidden;
        }

        .auth-box.signup-mode .pB {
            left: 0;
        }

        .d1 {
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: var(--shadow-md);
            top: -95px;
            right: -85px;
            pointer-events: none;
        }

        .d2 {
            position: absolute;
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: var(--shadow-md);
            bottom: -85px;
            left: -75px;
            pointer-events: none;
        }

        .p-inner {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(20px, 4.5vh, 48px) clamp(18px, 4.5vw, 52px);
        }

        .pA-reg {
            display: none;
        }

        .pA.show-reg .pA-login {
            display: none;
        }

        .pA.show-reg .pA-reg {
            display: flex;
        }

        .pB-hello,
        .pB-welcome {
            text-align: center;
            padding: clamp(20px, 4.5vh, 52px) clamp(14px, 3.5vw, 40px);
            transition: opacity 0.18s ease;
        }

        .pB-welcome {
            opacity: 0;
            pointer-events: none;
        }

        .pB.show-welcome .pB-hello {
            opacity: 0;
            pointer-events: none;
        }

        .pB.show-welcome .pB-welcome {
            opacity: 1;
            pointer-events: auto;
        }

        .fp-title {
            font-size: clamp(17px, 2.6vw, 26px);
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.18em;
            margin-bottom: clamp(12px, 2.5vh, 22px);
            white-space: nowrap;
        }

        .social-row {
            display: flex;
            gap: clamp(8px, 1.2vw, 14px);
            margin-bottom: clamp(6px, 1vh, 10px);
        }

        .s-icon {
            width: clamp(34px, 4.2vw, 44px);
            height: clamp(34px, 4.2vw, 44px);
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.22s;
        }

        .s-icon svg {
            width: 20px;
            height: 20px;
            opacity: 0.4;
            transition: opacity 0.22s;
        }

        .s-icon:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .s-icon:hover svg {
            opacity: 0.7;
        }

        .s-icon.active {
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .s-icon.active svg {
            opacity: 1;
        }

        .social-hint {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            margin-bottom: clamp(10px, 2vh, 20px);
        }

        .field {
            width: 100%;
            margin-bottom: clamp(6px, 1.3vh, 12px);
        }

        .field input {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: clamp(9px, 1.8vh, 13px) 16px;
            font-family: inherit;
            font-size: clamp(13px, 1.5vw, 14px);
            color: var(--text);
            outline: none;
            box-shadow: var(--shadow-sm);
            transition: all 0.25s;
        }

        .field input::placeholder {
            color: var(--text-tertiary);
        }

        .field input:focus {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.04);
        }

        .forgot {
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
            margin: 2px 0 clamp(12px, 2vh, 20px);
            align-self: center;
            transition: color 0.2s;
        }

        .forgot:hover {
            color: var(--primary);
        }

        .btn-blue {
            padding: clamp(10px, 1.8vh, 13px) clamp(22px, 3.5vw, 48px);
            border-radius: 100px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: var(--primary);
            color: var(--bg);
            box-shadow: var(--shadow-md);
            transition: all 0.25s;
            position: relative;
            z-index: 1;
        }

        .btn-blue:hover {
            background: var(--primary-hover);
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        .btn-blue:active {
            transform: translateY(0);
        }

        .btn-blue:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-full {
            width: 100%;
            text-align: center;
        }

        .o-title {
            font-size: clamp(17px, 2.6vw, 26px);
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.02em;
            margin-bottom: clamp(10px, 1.5vh, 14px);
            position: relative;
            z-index: 1;
        }

        .o-sub {
            font-size: clamp(11px, 1.3vw, 13px);
            color: var(--text-secondary);
            line-height: 1.85;
            margin-bottom: clamp(18px, 3.5vh, 36px);
            max-width: 210px;
            position: relative;
            z-index: 1;
        }

        .login-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 100;
        }

        .login-close:hover {
            background: var(--border);
            color: var(--text);
        }

        .mobile-nav {
            display: none;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            color: #dc2626;
            margin-bottom: 12px;
            display: none;
            width: 100%;
        }

        .error-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .login-page {
                padding: 12px;
            }

            .auth-box {
                height: auto;
                border-radius: 20px;
                overflow: visible;
                width: 92vw;
            }

            .login-close {
                top: -45px;
                right: 0px;
                width: 40px;
                height: 40px;
                box-shadow: var(--shadow-md);
            }

            .auth-box::after {
                display: none;
            }

            .panel {
                position: relative;
                left: 0 !important;
                width: 100% !important;
                height: auto;
                transition: none !important;
                background: transparent !important;
                box-shadow: none !important;
            }

            .p-inner {
                position: relative;
                inset: auto;
                padding: 32px 24px;
            }

            .pB-hello,
            .pB-welcome {
                position: relative;
                inset: auto;
            }

            .pB {
                display: none !important;
            }

            .auth-box:not(.signup-mode) .pA-reg {
                display: none !important;
            }

            .auth-box.signup-mode .pA-login {
                display: none !important;
            }

            .auth-box.signup-mode .pA-reg {
                display: flex !important;
            }

            .mobile-nav {
                display: flex;
                background: var(--surface);
                border-radius: 20px 20px 0 0;
                overflow: hidden;
                border-bottom: 1px solid var(--border);
            }

            .m-tab {
                flex: 1;
                padding: 14px;
                text-align: center;
                font-size: 13px;
                font-weight: 700;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--text-secondary);
                cursor: pointer;
                border-bottom: 2px solid transparent;
                margin-bottom: -1px;
                transition: all 0.2s;
            }

            .auth-box:not(.signup-mode) .m-tab-si,
            .auth-box.signup-mode .m-tab-su {
                color: var(--primary);
                border-bottom-color: var(--primary);
            }

            .fp-title {
                white-space: normal;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="login-page" id="loginPage">
        <div class="auth-box" id="authBox">
            <button class="login-close" onclick="goBack()" title="关闭">
                <i class="fas fa-times"></i>
            </button>
            <div class="mobile-nav">
                <div class="m-tab m-tab-si" id="mSi" onclick="go(false)">登录</div>
                <div class="m-tab m-tab-su" id="mSu" onclick="go(true)">注册</div>
            </div>
            <div class="panel pA" id="pA">
                <div class="error-message" id="errorMessage"></div>
                <form class="p-inner pA-login" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="fp-title">登 录 账 号</div>
                    <div class="field">
                        <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username" />
                    </div>
                    <div class="field">
                        <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password" />
                    </div>
                    <span class="forgot" onclick="alert('请联系管理员重置密码')">忘记密码?</span>
                    <button type="submit" class="btn-blue btn-full" id="loginBtn">登录</button>
                </form>
                <p class="switch-link" onclick="go(true)" style="cursor:pointer;margin-top:6px;color:var(--primary); text-align:center;">没有账户？去注册</p>
                <form class="p-inner pA-reg" onsubmit="handleRegister(event)">
                    <div class="fp-title">创 建 账 号</div>
                    <div class="field">
                        <input type="text" id="regUsername" placeholder="用户名" autocomplete="off" />
                    </div>
                    <div class="field">
                        <input type="password" id="regPassword" placeholder="密码 (至少6位)" autocomplete="new-password" />
                    </div>
                    <div class="field">
                        <input type="password" id="regConfirmPwd" placeholder="确认密码" autocomplete="off" />
                    </div>
                    <div class="field">
                        <input type="text" id="regSecretKey" placeholder="注册密钥" autocomplete="off" />
                    </div>
                    <button type="submit" class="btn-blue btn-full" style="margin-top: 6px">注 册</button>
                </form>
            </div>
            <div class="panel pB" id="pB">
                <div class="d1"></div>
                <div class="d2"></div>
                <div class="p-inner pB-hello">
                    <div class="o-title">Hello Friend!</div>
                    <div class="o-sub">
                        去注册一个账号,成为尊贵的会员,享受数据同步服务!
                    </div>
                    <button class="btn-blue" onclick="go(true)">注册</button>
                </div>
                <div class="p-inner pB-welcome">
                    <div class="o-title">Welcome Back!</div>
                    <div class="o-sub">
                        已经有账号了嘛,去登陆账号来进入奇妙世界吧!!!
                    </div>
                    <button class="btn-blue" onclick="go(false)">登录</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://yeogthpysbqgehjkayaf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_WoO50Mbz0Rhfy0nPugE3vA_5UP__SYX";
        const STORAGE_KEY = "vipUser";

        let supabaseClient = null;
        let busy = false;

        async function initSupabase() {
            if (supabaseClient) return supabaseClient;

            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        storage: {
                            getItem: () => null,
                            setItem: () => {},
                            removeItem: () => {},
                        },
                        autoRefreshToken: false,
                        persistSession: false,
                    },
                    global: {
                        headers: {
                            'X-Client-Info': 'zero-seven-zero-music',
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                });
                return supabaseClient;
            } catch (e) {
                console.error("Supabase 初始化失败", e);
                throw e;
            }
        }

        function go(toSignup) {
            if (busy) return;
            busy = true;
            const authBox = document.getElementById('authBox');
            authBox.classList.toggle('signup-mode', toSignup);
            const pA = document.getElementById('pA');
            const pB = document.getElementById('pB');

            pA.classList.toggle('show-reg', toSignup);
            pB.classList.toggle('show-welcome', toSignup);
            setTimeout(() => { busy = false; }, 300);
        }

        function goBack() {
            window.location.href = './index.html';
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 3000);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span>登录中...';

            try {
                await initSupabase();

                const { data, error } = await supabaseClient.rpc('verify_vip_user', {
                    _username: username,
                    _password: password
                });

                if (error) {
                    throw new Error(`登录失败: ${error.message}`);
                }

                if (!data || !data.success) {
                    const errorMsg = data?.error;
                    if (errorMsg === 'USER_BANNED') {
                        throw new Error("您的账号已被封禁,无法登录。");
                    }
                    throw new Error(errorMsg === 'USER_NOT_FOUND' ? "用户名不存在" : errorMsg === 'INVALID_PASSWORD' ? "密码错误" : "用户名或密码错误");
                }

                const sessionToken = data.session_token;
                localStorage.setItem('sessionToken', sessionToken);

                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    id: data.user_id,
                    username: data.username,
                    avatar_url: data.avatar_url || '',
                    is_member: data.is_member || false,
                    is_permanent_member: data.is_permanent_member || false,
                    member_days_remaining: data.member_days_remaining || 0,
                    member_end_time: data.member_end_time || null
                }));
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('username', data.username);
                if (data.avatar_url) {
                    localStorage.setItem('userAvatar', data.avatar_url);
                }

                loginBtn.innerHTML = '登录成功!';
                setTimeout(() => {
                    window.location.href = './index.html';
                }, 500);

            } catch (error) {
                showError(error.message);
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirmPwd = document.getElementById('regConfirmPwd').value.trim();
            const secretKey = document.getElementById('regSecretKey').value.trim();
            const regBtn = document.querySelector('.pA-reg .btn-blue');

            if (!username || !password || !confirmPwd || !secretKey) {
                showError('请填写所有字段');
                return;
            }

            if (username.length < 1) {
                showError('用户名至少1个字符');
                return;
            }

            if (username.length > 15) {
                showError('用户名不能超过15个字符');
                return;
            }

            if (!/^[a-zA-Z0-9\u4e00-\u9fa5]+$/.test(username)) {
                showError('用户名只能包含字母、数字和中文');
                return;
            }

            if (password.length < 6) {
                showError('密码长度至少6位');
                return;
            }

            if (password.length > 20) {
                showError('密码不能超过20个字符');
                return;
            }

            if (password !== confirmPwd) {
                showError('两次输入的密码不一致');
                return;
            }

            if (!secretKey) {
                showError('注册密钥不能为空');
                return;
            }

            regBtn.disabled = true;
            regBtn.innerHTML = '<span class="loading-spinner"></span>注册中...';

            try {
                await initSupabase();

                const { data, error } = await supabaseClient.rpc('create_vip_user', {
                    _username: username,
                    _password: password,
                    _key: secretKey
                });

                if (error) {
                    throw new Error(`注册失败: ${error.message}`);
                }

                if (!data || !data.success) {
                    throw new Error(data?.error || "无效的密钥,请联系管理员获取");
                }

                const sessionToken = data.session_token;
                localStorage.setItem('sessionToken', sessionToken);

                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    id: data.user_id,
                    username: data.username,
                    avatar_url: data.avatar_url || '',
                    is_member: data.is_member || false,
                    is_permanent_member: data.is_permanent_member || false,
                    member_days_remaining: data.member_days_remaining || 0,
                    member_end_time: data.member_end_time || null
                }));
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('username', data.username);
                if (data.avatar_url) {
                    localStorage.setItem('userAvatar', data.avatar_url);
                }

                regBtn.innerHTML = '注册成功!';
                setTimeout(() => {
                    window.location.href = './index.html';
                }, 500);

            } catch (error) {
                showError(error.message);
                regBtn.disabled = false;
                regBtn.textContent = '注册';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || theme?.startsWith('dark')) {
                document.documentElement.classList.add('dark-theme');
            }
        });
    </script>
<section class="profile-page" id="profilePage" style="display:none;">
  <div class="profile-header" style="display:flex;justify-content:space-between;align-items:flex-start;padding:16px 0;">
    <div style="display:flex;gap:16px;align-items:flex-start;">
      <div class="profile-avatar" id="profileAvatar">
        <div class="avatar-container">
          <div class="avatar-inner"><i class="fas fa-user"></i></div>
          <div class="avatar-border"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div>
          <h2 class="profile-name" id="profileName" style="margin-bottom:4px;">访客</h2>
          <p class="profile-desc" id="profileDesc" style="font-size:13px;">登录以同步您的音乐数据</p>
        </div>
        <button class="login-action-btn" id="profileLoginBtn" onclick="window.openLoginPage && window.openLoginPage()"><i class="fas fa-sign-in-alt"></i> 登录 / 注册</button>
        <div style="display:flex;gap:8px;">
          <button class="login-action-btn" id="editAvatarBtn" style="display:none"><i class="fas fa-camera"></i> 更换头像</button>
          <button class="login-action-btn logout" id="profileLogoutBtn" onclick="window.confirmLogout && window.confirmLogout()" style="display:none"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
        </div>
      </div>
    </div>
  </div>
  <div class="stats-section">
    <div class="stats-grid">
      <div class="stat-item">
        <div style="display:flex;align-items:center;justify-content:flex-start;gap:8px;margin-bottom:12px;white-space:nowrap;">
          <i class="fas fa-play-circle" style="color:var(--primary);font-size:20px;"></i>
          <span style="font-size:15px;color:var(--text);white-space:nowrap;">播放次数：</span>
          <span class="stat-value" id="totalPlays" style="font-size:24px;font-weight:700;margin:0;white-space:nowrap;">0</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:flex-start;gap:8px;white-space:nowrap;">
          <i class="fas fa-clock" style="color:var(--primary);font-size:20px;"></i>
          <span style="font-size:15px;color:var(--text);white-space:nowrap;">播放时长：</span>
          <span class="stat-value" id="totalPlayTime" style="font-size:18px;font-weight:700;margin:0;white-space:nowrap;">0</span>
        </div>
      </div>
    </div>
  </div>
  <!-- 个人页面的其余内容省略，可根据需要自行补充 -->
</section>
</body>
</html>
